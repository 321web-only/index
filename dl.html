<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>画像ダウンロード</title>
  <style>
    .download-img {
      width: 300px;
      cursor: pointer;
      border-radius: 10px;
      transition: transform 0.2s;
    }

    .download-img:hover {
      transform: scale(1.05);
    }
  </style>
</head>
<body>

  <h2>画像をクリックすると自動でダウンロードされます</h2>

  <a href="2.png" download="event_image.jpg">
    <img src="2.png" alt="参加表ピンク" class="download-img">
  </a>

</body>
</html>
